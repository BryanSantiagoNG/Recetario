<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChefDigital | Recetario Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo"><h1>Recetario Digital</h1></div>
        <nav>
            <ul>
                <li><a href="#" onclick="showSection('inicio')">Inicio</a></li>
                <li><a href="#" onclick="showSection('recetas')">Mis Recetas</a></li>
                <li><a href="#" onclick="showSection('nueva')">Añadir Receta</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="inicio">
            <div class="hero">
                <h2>Tu cocina, bajo control</h2>
                <p>Guarda tus recetas y marca tu progreso paso a paso.</p>
                <button class="btn-main" onclick="showSection('recetas')">Empezar a Cocinar</button>
            </div>
        </section>

        <section id="recetas" class="hidden">
            <h2>Mis Recetas</h2>
            <div id="recipe-list" class="grid-container"></div>
        </section>

        <section id="nueva" class="hidden">
            <div class="form-container">
                <h2>Nueva Receta</h2>
                <form id="recipe-form">
                    <input type="text" id="title" placeholder="Nombre: Ej. Aguacate Relleno" required>
                    <textarea id="ingredients" placeholder="Ingredientes: Sal, Pimienta, Limón (separa por comas)" required></textarea>
                    <textarea id="procedure" placeholder="Pasos: Cortar, Mezclar, Servir (separa por comas)" required></textarea>
                    <input type="url" id="image" placeholder="URL de la imagen (Opcional)">
                    <button type="submit" class="btn-save">Guardar Receta</button>
                </form>
            </div>
        </section>
    </main>

    <div id="recipe-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" onclick="closeRecipe()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
